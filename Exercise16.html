<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <title>Exercise16</title>
    <style>
        p.one {
            border-color:red;
            background-color: lightblue;
            border-style: double;
            border-width: 8px;
        }

        p.two {
            border-color: blue;
            background-color: yellow;
            border-style: solid;
            border-radius: 8px;
        }

        p.three {
            border-color: gray;
            background-color: lightgreen;
            border-style: dotted;
            border-width: thick;
        }
    </style>
</head>
<body>
    <p class="one">Hello World</p>
    <p class="two">Hello World</p>
    <p class="three">Hello World</p>
</body>
</html>
